upstream trofimov_api {
    server api:4317;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    location = / {
        try_files /gateway/index.html =404;
    }

    location = /gateway {
        return 301 /gateway/;
    }

    location /gateway/ {
        try_files $uri $uri/ =404;
    }

    location = /app {
        return 301 /app/;
    }

    location /api/ {
        proxy_pass http://trofimov_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://trofimov_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /SKILL.md {
        proxy_pass http://trofimov_api/SKILL.md;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /llms.txt {
        proxy_pass http://trofimov_api/llms.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /llms-full.txt {
        proxy_pass http://trofimov_api/llms-full.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://trofimov_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /app/ {
        rewrite ^/app/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets outside the app base too
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /gateway/index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}


