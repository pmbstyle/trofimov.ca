version: '3.3'

services:
  nginx:
    container_name: trofimovca
    image: nginx:alpine
    depends_on:
      - api
    ports:
      - 8084:80
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginxproxymanager_default

  api:
    container_name: trofimovca-api
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4317
    expose:
      - 4317
    volumes:
      - ./server/runtime:/app/server/runtime
    networks:
      - nginxproxymanager_default

networks:
  nginxproxymanager_default:
    external: true
